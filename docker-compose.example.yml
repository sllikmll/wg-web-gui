services:
  wg-web-gui:
    build:
      context: .
    image: wg-web-gui:latest
    container_name: wg-web-gui
    restart: unless-stopped
    environment:
      WG_SECRET_KEY: "change-me-long-random-string"
      WG_DATA_DIR: /data
      WG_POLL_INTERVAL: "30"
      WG_ONLINE_THRESHOLD: "180"
      WG_METADATA_REFRESH_INTERVAL: "300"
      PORT: "5173"
    ports:
      - "8096:5173"
    volumes:
      - ./data:/data
      # Optional: mount SSH keys for server access.
      # In GUI use key path like /ssh/id_ed25519
      - ./ssh:/ssh:ro
